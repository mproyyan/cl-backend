services:
  mongo:
    image: mongo:7.0
    container_name: outfit-recommender-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s

  analyzer:
    build: ./analyzer
    container_name: outfit-recommender-analyzer
    ports:
      - "8000:8000"
      - "8501:8501"

  web:
    build: ./backend
    container_name: outfit-recommender-api
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      analyzer:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=outfit_recommender
      - PORT=3000
      - COLOR_DETECTION_API_URL=http://analyzer:8000/api/v1/color-analysis

volumes:
  mongo-data:
