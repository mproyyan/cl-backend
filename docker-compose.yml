version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: outfit-recommender-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build: .
    container_name: outfit-recommender-api
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=outfit_recommender
      - PORT=3000

volumes:
  mongo-data:
